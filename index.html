<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mapa Clínicas ISSSTE</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet.markercluster/dist/MarkerCluster.Default.css" />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="header">
    <div class="header-left">
      <img src="assets/logos/logo.svg" class="logo" alt="Logo ISSSTE" />
      <div>
        <h1>Mapa de Unidades Médicas</h1>
        <p class="header-subtitle">Clínicas y hospitales del ISSSTE</p>
      </div>
    </div>

    <div class="header-actions">
      <button id="btnToggleFiltros" class="btn-header btn-secundario" type="button" aria-expanded="true" aria-controls="toolbarWrap">
        Filtros
      </button>
      <button id="btnVerTodas" class="btn-header" type="button">Ver todas</button>
    </div>
  </header>

  <section class="toolbar-wrap" id="toolbarWrap">
    <div class="toolbar-head">
      <div>
        <p class="toolbar-title">Filtra y localiza unidades médicas</p>
        <p class="toolbar-subtitle">Puedes buscar por nombre, CLUES, dirección, estado o municipio.</p>
      </div>

      <div class="toolbar-status">
        <span id="contadorResultados" class="status-pill">0 resultados</span>
        <span id="resumenFiltros" class="status-pill status-pill-soft">Sin filtros</span>
      </div>
    </div>

    <div class="toolbar">
      <div class="filtro-grupo">
        <label for="filtroEstado">Estado</label>
        <select id="filtroEstado">
          <option value="TODOS">Todos los estados</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtroMunicipio">Municipio</label>
        <select id="filtroMunicipio">
          <option value="TODOS">Todos los municipios</option>
        </select>
      </div>

      <div class="filtro-grupo">
        <label for="filtroTipo">Tipo</label>
        <select id="filtroTipo">
          <option value="TODOS">Todos los tipos</option>
          <option value="CAF">CAF</option>
          <option value="CE">CE</option>
          <option value="CEQ">CEQ</option>
          <option value="CH">CH</option>
          <option value="CMCT">CMCT</option>
          <option value="CMF">CMF</option>
          <option value="CMFE">CMFE</option>
          <option value="CMFEQ">CMFEQ</option>
          <option value="CMN">CMN</option>
          <option value="HG">HG</option>
          <option value="HR">HR</option>
          <option value="UMF">UMF</option>
        </select>
      </div>

      <div class="filtro-grupo filtro-busqueda">
        <label for="busqueda">Búsqueda</label>
        <div class="search-shell">
          <span class="search-icon" aria-hidden="true">⌕</span>
          <input id="busqueda" type="text" placeholder="Nombre, CLUES, dirección, estado o municipio" autocomplete="off" />
          <button id="btnLimpiarBusqueda" class="search-clear" type="button" aria-label="Limpiar búsqueda" hidden>✕</button>
        </div>
      </div>

      <div class="filtro-grupo filtro-accion">
        <label>&nbsp;</label>
        <button id="btnLimpiarFiltros" type="button">Limpiar</button>
      </div>
    </div>
  </section>

  <main class="container">
    <div id="map"></div>

    <button id="btnToggleLegend" class="floating-toggle" type="button" aria-expanded="true" aria-controls="mapLegend">
      Leyenda
    </button>

    <aside id="panelInfo" class="panel" aria-live="polite" aria-label="Información de la unidad médica">
      <button class="cerrar" id="cerrarPanel" type="button" aria-label="Cerrar panel">✕</button>

      <h2 id="nombre">Selecciona una clínica</h2>

      <div class="badges">
        <span id="tipo" class="badge">-</span>
        <span id="nivel" class="badge">-</span>
        <span id="ubicacion" class="badge badge-secundario">-</span>
      </div>

      <p><strong>CLUES:</strong> <span id="clues">-</span></p>
      <p><strong>Dirección:</strong> <span id="direccion">Haz clic en un punto del mapa</span></p>

      <div class="panel-actions">
        <button id="btnCopiarClues" class="btn-secundario-panel" type="button">Copiar CLUES</button>
        <a id="ruta" target="_blank" rel="noopener noreferrer" class="btn-ruta" href="#">Cómo llegar</a>
      </div>
    </aside>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet.markercluster/dist/leaflet.markercluster.js"></script>
  <script src="script.js"></script>
</body>
</html>
